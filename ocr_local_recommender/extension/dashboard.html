<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Local Recommender Dashboard</title>
  <style>
    :root {
      --bg: #f4eee5;
      --panel: #fffaf3;
      --line: #ddd2bf;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --danger: #b45309;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f2e9 0%, var(--bg) 100%);
    }

    .page {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .subtle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar,
    .grid > section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 16px 34px rgba(31, 41, 55, 0.08);
    }

    .toolbar {
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      flex: 1 1 260px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      background: #103b34;
      color: #fff;
      border-color: #103b34;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap: 16px;
      min-height: 70vh;
    }

    section {
      padding: 14px;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    section h2 {
      margin: 0;
      font-size: 16px;
    }

    .list {
      overflow: auto;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 0;
    }

    .entry-card,
    .log-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fffdf8;
      display: grid;
      gap: 8px;
    }

    .entry-head,
    .log-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .pill {
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #bddbd5;
      background: #ecfaf6;
      color: var(--accent);
    }

    .pill.weak {
      border-color: #e6d1a8;
      background: #fff5dc;
      color: var(--danger);
    }

    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail {
      border-top: 1px dashed var(--line);
      padding-top: 8px;
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>OCR Local Recommender Dashboard</h1>
        <div class="subtle">Inspect candidates, blacklist or restore them, and review recent event logs.</div>
      </div>
      <button id="refresh-all" class="primary">Refresh All</button>
    </div>

    <div class="toolbar">
      <input id="search-query" type="text" placeholder="Search stored candidates or label content">
      <button id="search-button" class="primary">Search</button>
      <button id="clear-search">Clear</button>
    </div>

    <div class="grid">
      <section>
        <h2>Candidates</h2>
        <div id="entry-list" class="list"></div>
      </section>
      <section>
        <h2>Recent Logs</h2>
        <div id="log-list" class="list"></div>
      </section>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
